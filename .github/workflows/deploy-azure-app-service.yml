# This workflow demonstrates a manual deployment of the built Vite frontend
# to Azure App Service using a publish profile.
name: Deploy Frontend To Azure App Service

on:
  workflow_dispatch:

# on:
#   workflow_dispatch:
#   push:
#     branches:
#       - dev

permissions:
  # The workflow only needs to read repository contents.
  contents: read

env:
  # Shared workflow settings used across jobs and steps.
  NODE_VERSION: "20"
  FRONTEND_DIR: frontend
  DEPLOY_DIR: frontend/deploy-package
  DEPLOY_ZIP: frontend/velo-app-service.zip
  # Repository variable for the Web App used by the publish-profile workflow.
  AZURE_WEBAPP_NAME_PUBLISH: ${{ vars.AZURE_WEBAPP_NAME_PUBLISH }}

jobs:
  # Stage 1: build the frontend and package the deployable artifact.
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: fetch the repository so the runner can access the app code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: install the required Node.js version and enable npm caching.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Step 3: install frontend dependencies exactly as locked.
      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      # Step 4: build the static frontend bundle that will be deployed.
      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      # Step 5: create the runtime package that App Service will execute.
      - name: Prepare App Service package
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          rm -rf deploy-package
          rm -f velo-app-service.zip
          mkdir -p deploy-package
          cp -R dist deploy-package/dist
          cp package.json deploy-package/package.json
          cp package-lock.json deploy-package/package-lock.json
          cp server.js deploy-package/server.js
          cd deploy-package
          zip -r ../velo-app-service.zip .

      # Step 6: upload the packaged app so the deploy stage can download it.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-app-service-package
          path: ${{ env.DEPLOY_ZIP }}

  # Stage 2: download the build artifact and push it to Azure App Service.
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: prod

    steps:
      # Step 1: retrieve the artifact created in the build stage.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-app-service-package
          path: app

      # Step 2: deploy the built static files to the target Web App.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME_PUBLISH }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app/velo-app-service.zip
